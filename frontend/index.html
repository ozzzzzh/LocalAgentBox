<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentBox IDE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部工具栏 -->
    <header class="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">🤖 AgentBox IDE</h1>
      </div>
      <div class="toolbar-center">
        <div class="connection-status" id="connectionStatus">
          <span class="status-dot disconnected"></span>
          <span class="status-text">未连接</span>
        </div>
      </div>
      <div class="toolbar-right">
        <span id="currentFile" class="current-file"></span>
        <button id="toggleToolsBtn" class="btn btn-icon" title="工具面板">🔧</button>
        <button id="toggleLogsBtn" class="btn btn-icon" title="日志面板">📋</button>
        <button id="settingsBtn" class="btn btn-icon" title="设置">⚙️</button>
      </div>
    </header>

    <!-- 主内容区 - 新布局 -->
    <main class="main-content new-layout">
      <!-- 左侧边栏 - 文件浏览器 -->
      <aside class="sidebar left-sidebar" id="leftSidebar">
        <div class="sidebar-header">
          <span>📁 文件</span>
          <div class="file-actions">
            <button id="newFileBtn" class="btn btn-small" title="新建文件">📄</button>
            <button id="refreshFilesBtn" class="btn btn-small" title="刷新">🔄</button>
          </div>
        </div>
        <div class="file-tree" id="fileTree">
          <div class="empty-state">连接后显示文件</div>
        </div>
      </aside>

      <!-- 左侧拖拽条 -->
      <div class="resize-handle resize-handle-v" data-resize="left"></div>

      <!-- 中间内容区 - 编辑器 -->
      <section class="center-area editor-area">
        <!-- 连接面板 -->
        <div id="connectionPanel" class="panel connection-panel">
          <h2>连接到 OpenClaw Gateway</h2>
          <form id="connectionForm">
            <div class="form-group">
              <label for="gatewayUrl">Gateway 地址</label>
              <input type="text" id="gatewayUrl"
                     placeholder="ws://192.168.99.5:18789"
                     value="ws://192.168.99.5:18789">
            </div>
            <div class="form-group">
              <label for="apiKey">Token</label>
              <input type="password" id="apiKey"
                     placeholder="your-token">
            </div>
            <div class="form-group checkbox">
              <input type="checkbox" id="useTls">
              <label for="useTls">使用 TLS (wss://)</label>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="connectBtn">
                连接
              </button>
            </div>
          </form>
        </div>

        <!-- IDE 主区域：编辑器 -->
        <div id="idePanel" class="panel ide-panel hidden">
          <div class="editor-section full-height">
            <div class="editor-tabs" id="editorTabs"></div>
            <div class="editor-container">
              <div class="line-numbers" id="lineNumbers"></div>
              <textarea id="codeEditor" spellcheck="false"></textarea>
            </div>
            <div class="editor-footer">
              <span id="cursorPosition">行 1, 列 1</span>
              <span id="fileInfo"></span>
              <div class="editor-actions">
                <button id="saveFileBtn" class="btn btn-small">💾 保存</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 右侧拖拽条 -->
      <div class="resize-handle resize-handle-v" data-resize="right"></div>

      <!-- 右侧边栏 - Chat -->
      <aside class="sidebar right-sidebar chat-sidebar" id="rightSidebar">
        <div class="chat-section full-height">
          <div class="chat-header">
            <span>💬 AI Assistant</span>
            <div class="chat-actions">
              <button id="clearChatBtn" class="btn btn-small" title="清空对话">🗑️</button>
              <button id="newSessionBtn" class="btn btn-small" title="新会话">➕</button>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
              <div class="welcome-icon">🤖</div>
              <div class="welcome-text">
                <h3>欢迎使用 AgentBox IDE</h3>
                <p>我可以帮你：</p>
                <ul>
                  <li>📝 编写和修改代码</li>
                  <li>🔍 分析文件内容</li>
                  <li>🔧 执行工具命令</li>
                  <li>💡 解答编程问题</li>
                </ul>
                <p class="hint">输入消息开始对话，或使用 @ 引用当前文件</p>
              </div>
            </div>
          </div>
          <div class="chat-input-area">
            <div class="chat-context" id="chatContext">
              <span class="context-label">当前文件:</span>
              <span class="context-file" id="contextFile">-</span>
            </div>
            <div class="chat-input-wrapper">
              <textarea id="chatInput" placeholder="输入消息... 使用 @ 引用当前文件，Enter 发送" rows="3"></textarea>
              <button id="sendChatBtn" class="btn btn-primary" title="发送">📤</button>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <!-- 底部抽屉 - 工具/日志 -->
    <div class="drawer" id="drawer">
      <div class="drawer-handle" id="drawerHandle">
        <span class="drawer-handle-icon">▲</span>
      </div>
      <div class="drawer-content">
        <div class="drawer-header">
          <div class="drawer-tabs">
            <button class="drawer-tab active" data-tab="tools">🔧 工具</button>
            <button class="drawer-tab" data-tab="logs">📋 日志</button>
          </div>
          <button class="drawer-close" id="closeDrawerBtn">✕</button>
        </div>
        <div class="drawer-body">
          <div id="toolsDrawer" class="drawer-panel active">
            <div id="toolsList" class="tools-list">
              <div class="empty-state">连接后加载工具</div>
            </div>
          </div>
          <div id="logsDrawer" class="drawer-panel">
            <div class="logs-header">
              <button id="clearLogsBtn" class="btn btn-small">清空</button>
            </div>
            <div id="logsContainer" class="logs-container"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部状态栏 -->
    <footer class="status-bar">
      <div class="status-left">
        <span id="workspacePath">工作区: -</span>
      </div>
      <div class="status-center">
        <span id="connectionInfo">-</span>
      </div>
      <div class="status-right">
        <span id="toolCount">工具: 0</span>
        <span id="sessionInfo">会话: -</span>
      </div>
    </footer>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="modal-close" id="closeSettingsBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="settingTheme">主题</label>
          <select id="settingTheme">
            <option value="dark">深色</option>
            <option value="light">浅色</option>
          </select>
        </div>
        <div class="form-group">
          <label for="settingFontSize">字体大小</label>
          <input type="number" id="settingFontSize" value="14" min="10" max="24">
        </div>
        <div class="form-group">
          <label for="settingAutoReconnect">自动重连</label>
          <input type="checkbox" id="settingAutoReconnect" checked>
        </div>
      </div>
    </div>
  </div>

  <!-- 消息提示 -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="dist/main.js"></script>
</body>
</html>
